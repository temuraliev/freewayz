# После push в main подключается к серверу по SSH, делает git pull и перезапускает бота.
# Секреты репозитория (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST  — IP или домен сервера (например 123.45.67.89)
#   DEPLOY_USER — пользователь SSH (например root)
#   DEPLOY_KEY  — приватный SSH-ключ (содержимое id_rsa, без пароля)
name: Deploy bot to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/freewayz || exit 1
            PREV_COMMIT=$(git rev-parse HEAD)
            git pull || exit 1
            npm ci --omit=dev || { git checkout "$PREV_COMMIT"; exit 1; }
            npx pm2 restart all
            sleep 3
            npx pm2 list
            # Check both bots are online
            npx pm2 jlist | node -e "
              const apps = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const failed = apps.filter(a => a.pm2_env.status !== 'online');
              if (failed.length) {
                console.error('FAILED:', failed.map(a => a.name).join(', '));
                process.exit(1);
              }
              console.log('All bots online');
            " || {
              echo "Bots failed to start, rolling back..."
              git checkout "$PREV_COMMIT"
              npx pm2 restart all
              exit 1
            }
